<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Datos Avanzado - Actividad 4</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <div class="header-content">
            <h1><i class="fas fa-database"></i> DataViewer Pro</h1>
            <button id="theme-toggle" class="btn-icon">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <main class="container">
        <section class="card base-file-section">
            <h2><i class="fas fa-cloud-arrow-down"></i> Archivos en DynamoDB</h2>
            <p>Selecciona un archivo guardado previamente en la nube para visualizar sus datos.</p>
            <div class="search-box" style="margin-bottom: 1rem;">
                <select id="db-file-select" class="form-select">
                    <option value="">Cargando archivos disponibles...</option>
                </select>
            </div>
            <button id="btn-load-db" class="btn btn-primary" disabled>
                <i class="fas fa-cloud-download-alt"></i> Cargar desde Base de Datos
            </button>
        </section>

        <section class="card interactive-section">
            <h2><i class="fas fa-upload"></i> Analizador Personalizado</h2>
            
            <div class="controls-row">
                <div class="file-upload">
                    <input type="file" id="file-input" accept=".csv, .json, .txt" hidden>
                    <label for="file-input" class="btn btn-primary">
                        <i class="fas fa-folder-open"></i> Subir Archivo Local
                    </label>
                    <span id="file-name">Ningún archivo seleccionado</span>
                </div>

                <div class="action-buttons">
                    <button id="btn-save-db" class="btn btn-primary" disabled>
                        <i class="fas fa-cloud-arrow-up"></i> Guardar en BD
                    </button>
                    <button id="export-pdf" class="btn btn-danger" disabled>
                        <i class="fas fa-file-pdf"></i> Exportar a PDF
                    </button>
                </div>
            </div>

            <div class="search-filter-row">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Búsqueda libre (ej. 20%, México, activo)..." disabled>
                </div>
            </div>

            <div class="table-container" id="table-export-area">
                <table id="data-table">
                    <thead>
                        <tr id="table-head"></tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
                <div id="empty-state" class="empty-state">
                    Sube un archivo para comenzar a analizar datos.
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script src="js/tableManager.js"></script>
    <script src="js/fileHandler.js"></script>
    <script src="js/exportPdf.js"></script>
    <script src="js/apiManager.js"></script> <script src="js/app.js"></script>
</body>
</html>
